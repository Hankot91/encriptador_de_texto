<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/styles.css">
    <link rel="stylesheet" href="Css/StylesTablet.css">
    <link rel="stylesheet" href="Css/StylesPhone.css">
    <link rel="shortcut icon" href="Images/keyboard-solid.svg">
    <title>Encriptador de texto</title>
</head>
<body>
    <main>

        <div class="wrapper-logo">
            <div class="container-logo">
                <img src="Images/Logo.svg" alt="logo alura" class="container-logo-item">
            </div>
        </div>

        
        <div class="wrapper-inputs">
            <div class="container-inputs">
                <div class="container-query">
                    <textarea id="inputText" maxlength="280" placeholder="Ingrese el texto aqui"></textarea>
                </div>
                
                <div class="container-frame1">
                    <div class="container-warning">
                        <img src="Images/exclamacion.svg" alt="alerta" class="frame1-item-image">
                        <p>Solo letras minúsculas y sin acentos</p>
                    </div>
                    
                    <div class="container-crypt">
                        <button id="encriptar" class="button-encriptar"> Encriptar</button>
                        <button id="desencriptar" class="button-desencriptar">Desencriptar</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="wrapper-rectangle">
            <div class="container-rectangle">
                <div class="content-rectangle">
                    <div id="before" class="content-before">
                        <div class="container-image">
                            <img src="Images/muñeco.svg" alt="muñeco" class="container-image-item">
                        </div>
            
                        <div class="container-frame2">
                            <p>Ningún mensaje fue encontrado</p>
                            <p>Ingresa el texto que desees encriptar o desencriptar.</p>
                        </div>
                    </div>

                    <div id="after" class="content-after">
                        <p id="textResult" class="content-text">
                            
                        </p>
                        <button id="copy" class="button-copy">Copiar</button>
                    </div>
                    
                </div>
            </div>
    
        </div>
    </main>
    <footer>
        <p>Develope by Camilo Vanegas</p>
    </footer>
</body>
<script src="Javascript/index.js"></script>
</html>
